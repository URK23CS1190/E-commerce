apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      containers:
        - name: ecommerce-app
          image: alfinjones/ecommerce-noir:latest
          ports:
            - containerPort: 3000